<!DOCTYPE html>
<html>
<head>
    <title>DylPredict Test</title>
</head>
<body>
    <h1>DylPredict API Test</h1>
    <div>
        <input type="text" id="symbol" value="BTCUSDT">
        <button onclick="testAPI()">Test API</button>
    </div>
    <pre id="result" style="background:#f0f0f0; padding:10px; margin-top:20px;"></pre>

    <script>
        const BASE_URL = 'https://spotty-lizzie-dylpredict-2b047c63.koyeb.app';
        
        async function testAPI() {
            const symbol = document.getElementById('symbol').value;
            const resultEl = document.getElementById('result');
            
            resultEl.textContent = 'Loading...';
            
            try {
                // Test root endpoint dulu
                resultEl.textContent += '\n\n📡 Testing root endpoint...';
                const rootRes = await fetch(BASE_URL + '/');
                const rootData = await rootRes.json();
                resultEl.textContent += '\n✅ Root OK: ' + JSON.stringify(rootData);
                
                // Test analyze endpoint
                resultEl.textContent += '\n\n📡 Testing analyze endpoint...';
                const analyzeUrl = `${BASE_URL}/analyze/${symbol}`;
                resultEl.textContent += `\nURL: ${analyzeUrl}`;
                
                const analyzeRes = await fetch(analyzeUrl);
                resultEl.textContent += `\nStatus: ${analyzeRes.status} ${analyzeRes.statusText}`;
                
                const text = await analyzeRes.text();
                resultEl.textContent += `\nResponse: ${text.substring(0, 500)}`;
                
            } catch (error) {
                resultEl.textContent += '\n❌ ERROR: ' + error.message;
                console.error(error);
            }
        }
        
        // Auto run
        testAPI();
    </script>
</body>
</html>
