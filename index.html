<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DylPredict V87 | Professional Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f9f8f4;
            --text-main: #292929;
            --text-muted: #6b6b6b;
            --accent-orange: #d97757;
            --card-bg: #ffffff;
            --border-color: #e5e2da;
            --short-border: #d95757;
            --long-border: #57d977;
            --short-bg: #f5c2c2;
            --long-bg: #c2f5c2;
        }

        body, html { 
            height: 100%; 
            margin: 0; 
            padding: 0;
            background-color: var(--bg-color); 
            font-family: 'Inter', sans-serif; 
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Layout Center Wrapper */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 20px;
            box-sizing: border-box;
        }

        /* State saat hasil muncul */
        .main-wrapper.has-result {
            justify-content: flex-start;
            padding-top: 60px;
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
            transition: all 0.5s ease;
        }

        .has-result .brand { 
            transform: scale(0.8); 
            margin-bottom: 20px; 
        }

        .brand span { 
            color: var(--accent-orange); 
            font-size: 42px; 
            display: inline-block;
        }

        h1 { 
            font-family: 'Source Serif Pro', serif; 
            font-size: 40px; 
            margin: 10px 0; 
            letter-spacing: -0.02em; 
            color: #1a1a1a;
            font-weight: 600;
        }

        /* Search Container */
        .search-area { 
            width: 100%; 
            max-width: 700px; 
            transition: all 0.5s ease; 
        }

        .search-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 8px 8px 8px 24px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .search-container:focus-within {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            border-color: #d4d0c8;
        }

        input#symbol {
            border: none; 
            outline: none; 
            flex-grow: 1;
            font-size: 18px; 
            background: transparent; 
            padding: 14px 0;
            color: var(--text-main);
            font-weight: 400;
        }

        input#symbol::placeholder {
            color: #b0b0b0;
            font-weight: 300;
        }

        .btn-group button {
            padding: 12px 28px; 
            border-radius: 24px;
            border: none; 
            cursor: pointer; 
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .btn-analyze { 
            background: #1a1a1a; 
            color: white; 
        }

        .btn-analyze:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        /* Result Card (Hidden by default) */
        .result-wrapper {
            width: 100%; 
            max-width: 900px;
            margin-top: 50px;
            display: none; /* Muncul lewat JS */
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .output-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 0; /* Header control terpisah */
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.04);
            transition: all 0.4s ease;
        }

        /* Card Header dengan Tombol Aksi */
        .card-header {
            padding: 14px 24px;
            background: #fafafa;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #resultTitle { 
            font-weight: 600; 
            font-size: 14px; 
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-action { 
            background: #ffffff; 
            border: 1px solid #e0e0e0 !important; 
            border-radius: 16px;
            font-size: 12px; 
            padding: 6px 14px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .btn-action:hover { 
            background: #f5f5f5; 
            border-color: #d0d0d0;
            transform: translateY(-1px);
        }

        /* Terminal Output Styling */
        .terminal-style {
            padding: 28px;
            margin: 0;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.7;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #fbfbf9;
            color: #1e1e1e;
        }

        /* Scrollbar Styling */
        .terminal-style::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-style::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 4px;
        }

        .terminal-style::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border-radius: 4px;
        }

        .terminal-style::-webkit-scrollbar-thumb:hover {
            background: #a0a0a0;
        }

        /* Footer */
        .footer-note {
            margin-top: 20px;
            font-size: 12px; 
            color: #aaa; 
            text-align: center;
            letter-spacing: 0.5px;
        }

        .footer-note span {
            color: var(--accent-orange);
        }

        /* Loading state */
        .loading {
            position: relative;
        }

        .loading::after {
            content: "...";
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: "."; }
            40% { content: ".."; }
            60%, 100% { content: "..."; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .brand h1 { font-size: 32px; }
            .search-container { flex-direction: column; padding: 16px; }
            .btn-group { width: 100%; margin-top: 12px; }
            .btn-group button { width: 100%; }
            .card-header { flex-direction: column; gap: 12px; }
            .action-buttons { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="main-wrapper" id="wrapper">
    <!-- Brand dengan icon khas Claude -->
    <div class="brand">
        <span>✳</span>
        <h1>Back at it, Dylan</h1>
    </div>

    <!-- Search Area - Centered di awal -->
    <div class="search-area">
        <div class="search-container">
            <input type="text" id="symbol" placeholder="Analyze a symbol..." value="JASMYUSDT">
            <div class="btn-group">
                <button class="btn-analyze" onclick="handleAnalyze()">Analyze</button>
            </div>
        </div>
    </div>

    <!-- Result Area - Muncul setelah analyze -->
    <div class="result-wrapper" id="resultArea">
        <div class="output-card" id="outputCard">
            <!-- Header dengan kontrol professional -->
            <div class="card-header">
                <span id="resultTitle">Terminal Output</span>
                <div class="action-buttons">
                    <button class="btn-action" onclick="copyResult()" title="Copy to clipboard">📋 Copy</button>
                    <button class="btn-action" onclick="downloadResult()" title="Download as text file">⬇️ Download</button>
                    <button class="btn-action" onclick="fetchJSON()" title="View raw JSON data">🔍 JSON</button>
                </div>
            </div>
            <!-- Terminal output area -->
            <pre id="output" class="terminal-style">Analyzing...</pre>
        </div>
        
        <!-- Footer note -->
        <div class="footer-note">
            <span>✳</span> DylPredict AI V87 • High-Confidence Neural Analysis
        </div>
    </div>
</div>

<script>
    // Configuration
    const BASE_URL = 'https://spotty-lizzie-dylpredict-2b047c63.koyeb.app';
    
    // DOM Elements
    const wrapper = document.getElementById('wrapper');
    const resultArea = document.getElementById('resultArea');
    const outputEl = document.getElementById('output');
    const cardEl = document.getElementById('outputCard');
    const resultTitle = document.getElementById('resultTitle');
    const symbolInput = document.getElementById('symbol');

    // ==================== MAIN FUNCTIONS ====================

    async function handleAnalyze() {
        const symbol = symbolInput.value.toUpperCase().trim();
        if (!symbol) {
            alert('Please enter a symbol');
            return;
        }

        // Animate: geser layout ke atas
        wrapper.classList.add('has-result');
        resultArea.style.display = 'block';
        
        // Trigger fade-in animation
        setTimeout(() => {
            resultArea.style.opacity = '1';
            resultArea.style.transform = 'translateY(0)';
        }, 50);

        // Set loading state
        outputEl.textContent = `📡 Gathering intelligence for ${symbol}...`;
        resultTitle.textContent = `Analyzing ${symbol}`;

        // Reset card border
        cardEl.style.borderTop = '1px solid var(--border-color)';
        cardEl.style.borderColor = 'var(--border-color)';

        try {
            // Fetch terminal output
            const response = await fetch(`${BASE_URL}/analyze/${symbol}/terminal`);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const text = await response.text();
            
            // Display result
            outputEl.textContent = text;
            resultTitle.textContent = `Analysis: ${symbol}`;

            // Smart Highlighting berdasarkan bias
            if (text.includes("FINAL BIAS: SHORT")) {
                cardEl.style.borderTop = `4px solid var(--short-border)`;
                cardEl.style.borderColor = '#f5c2c2';
            } else if (text.includes("FINAL BIAS: LONG")) {
                cardEl.style.borderTop = `4px solid var(--long-border)`;
                cardEl.style.borderColor = '#c2f5c2';
            } else {
                cardEl.style.borderTop = '1px solid var(--border-color)';
                cardEl.style.borderColor = 'var(--border-color)';
            }

        } catch (error) {
            outputEl.textContent = `❌ Error: ${error.message}`;
            cardEl.style.borderTop = '4px solid #ff6b6b';
            console.error('Fetch error:', error);
        }
    }

    // ==================== UTILITY FUNCTIONS ====================

    function downloadResult() {
        const text = outputEl.textContent;
        const symbol = symbolInput.value.toUpperCase().trim() || 'analysis';
        const blob = new Blob([text], { type: 'text/plain' });
        const anchor = document.createElement('a');
        
        anchor.download = `DylPredict_${symbol}_${new Date().toISOString().slice(0,10)}.txt`;
        anchor.href = window.URL.createObjectURL(blob);
        anchor.click();
        
        // Cleanup
        window.URL.revokeObjectURL(anchor.href);
    }

    function copyResult() {
        navigator.clipboard.writeText(outputEl.textContent)
            .then(() => {
                // Temporary feedback
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 1500);
            })
            .catch(err => {
                alert('Failed to copy: ' + err.message);
            });
    }

    async function fetchJSON() {
        const symbol = symbolInput.value.toUpperCase().trim();
        if (!symbol) return;

        outputEl.textContent = "📡 Loading Raw JSON...";
        resultTitle.textContent = `Raw JSON: ${symbol}`;

        try {
            const response = await fetch(`${BASE_URL}/analyze/${symbol}`);
            const data = await response.json();
            outputEl.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
            outputEl.textContent = `❌ Error: ${error.message}`;
        }
    }

    // ==================== EVENT LISTENERS ====================

    // Enter key untuk analyze
    symbolInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            handleAnalyze();
        }
    });

    // Auto-analyze on page load (untuk demo)
    window.addEventListener('load', () => {
        setTimeout(handleAnalyze, 800);
    });

    // Optional: Reset layout ketika user klik logo (hidden feature)
    document.querySelector('.brand').addEventListener('dblclick', () => {
        wrapper.classList.remove('has-result');
        resultArea.style.opacity = '0';
        resultArea.style.transform = 'translateY(30px)';
        setTimeout(() => {
            resultArea.style.display = 'none';
        }, 500);
    });
</script>
</body>
</html>
